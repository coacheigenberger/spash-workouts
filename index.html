<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Workout Attendance</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --success: #10b981;
            --dark: #1f2937;
            --light: #f3f4f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { text-align: center; color: var(--primary); margin-top: 0; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        select { border: 2px solid #ccc; background-color: white; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--secondary); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .success-box {
            background-color: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--success);
            margin-top: 15px;
            display: none;
        }
        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .badge {
            background: #dee2e6;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .badge.earned {
            background: #fef08a;
            color: #854d0e;
            border: 1px solid #ca8a04;
        }
        .stats {
            background: #eff6ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
        }
        #loading { text-align: center; font-weight: bold; color: var(--secondary); display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️‍♂️ Summer Workouts</h1>
    <h2>Attendance Cloud Check-In</h2>
    
    <div id="loading">Connecting to cloud database...</div>

    <div id="formContent">
        <label for="playerSelect">Select Your Name:</label>
        <select id="playerSelect">
            <option value="">-- Loading Roster... --</option>
        </select>

        <button id="checkInBtn" disabled>Check In Today</button>
    </div>

    <div id="successBox" class="success-box">
        <h3>✅ Check-In Processed!</h3>
        <p id="welcomeMessage"></p>
        
        <div class="stats">
            <strong>Total Workouts:</strong> <span id="statTotal">0</span><br>
            <strong>Total Points:</strong> <span id="statPoints">0</span> 🪙
        </div>

        <h4>Your Badges:</h4>
        <div id="badgesContainer" class="badges-container"></div>
    </div>
</div>

        "YANG, ISAAC D.", "ZANOW, BENNETT"
    ];

    const playerSelect = document.getElementById('playerSelect');
    const checkInBtn = document.getElementById('checkInBtn');
    const loadingDiv = document.getElementById('loading');
    const successBox = document.getElementById('successBox');

    // Build the dropdown instantly using your typed roster
    window.addEventListener('DOMContentLoaded', () => {
        playerSelect.innerHTML = '<option value="">-- Choose from Roster --</option>';
        myRoster.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            playerSelect.appendChild(opt);
        });
        checkInBtn.disabled = false;
        loadingDiv.style.display = 'none';
    });

    // Submitting handler with anti-duplicate lock
    let isSubmitting = false;

    checkInBtn.addEventListener('click', () => {
        const playerName = playerSelect.value;
        if (!playerName) {
            alert('Please select your name!');
            return;
        }

        if (isSubmitting) return; 
        
        isSubmitting = true;
        loadingDiv.style.display = 'block';
        checkInBtn.disabled = true;
        checkInBtn.innerText = "Processing Check-In...";

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ playerName: playerName })
        })
        .then(() => {
            setTimeout(() => {
                loadingDiv.style.display = 'none';
                checkInBtn.disabled = false;
                checkInBtn.innerText = "Check In Today";
                isSubmitting = false; 
                
                document.getElementById('welcomeMessage').innerText = `Awesome job, ${playerName}! Your submission was sent to Coach's Google Sheet.`;
                document.getElementById('statTotal').innerText = "-";
                document.getElementById('statPoints').innerText = "-";
                document.getElementById('badgesContainer').innerHTML = "<p style='font-size:12px; color:#666;'>Logins record live to the sheet! To see your exact badges, check the master dashboard.</p>";
                successBox.style.display = 'block';
                window.scrollTo({ top: successBox.offsetTop, behavior: 'smooth' });
            }, 4000); 
        })
        .catch(err => {
            loadingDiv.style.display = 'none';
            checkInBtn.disabled = false;
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false;
            alert("Network error. Please try again.");
            console.error(err);
        });
    });
</script>
</body>
</html>
