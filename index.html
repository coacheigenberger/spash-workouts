<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Workout Attendance</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --success: #10b981;
            --dark: #1f2937;
            --light: #f3f4f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { text-align: center; color: var(--primary); margin-top: 0; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        select { border: 2px solid #ccc; background-color: white; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--secondary); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .success-box {
            background-color: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--success);
            margin-top: 15px;
            display: none;
        }
        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .badge {
            background: #dee2e6;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .badge.earned {
            background: #fef08a;
            color: #854d0e;
            border: 1px solid #ca8a04;
        }
        .stats {
            background: #eff6ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
        }
        #loading { text-align: center; font-weight: bold; color: var(--secondary); display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️‍♂️ Summer Workouts</h1>
    <h2>Attendance Cloud Check-In</h2>
    
    <div id="loading">Connecting to cloud database...</div>

    <div id="formContent">
        <label for="playerSelect">Select Your Name:</label>
        <select id="playerSelect">
            <option value="">-- Loading Roster... --</option>
        </select>

        <button id="checkInBtn" disabled>Check In Today</button>
    </div>

    <div id="successBox" class="success-box">
        <h3>✅ Check-In Processed!</h3>
        <p id="welcomeMessage"></p>
        
        <div class="stats">
            <strong>Total Workouts:</strong> <span id="statTotal">0</span><br>
            <strong>Total Points:</strong> <span id="statPoints">0</span> 🪙
        </div>

        <h4>Your Badges:</h4>
        <div id="badgesContainer" class="badges-container"></div>
    </div>
</div>

<script>
    // Paste your Google Web App deployment URL between the quotes below:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby7OUN28lA8Hyx7v1IKOri7ORyJcf3F829kA1Is9MARyE2x9ORx-Y7rxqo-R2QtBryB6g/exec";

    const playerSelect = document.getElementById('playerSelect');
    const checkInBtn = document.getElementById('checkInBtn');
    const loadingDiv = document.getElementById('loading');
    const successBox = document.getElementById('successBox');

    // Fetch roster from Google Sheet instantly on page load
    window.addEventListener('DOMContentLoaded', () => {
        showLoading(true);
        fetch(WEB_APP_URL)
            .then(response => response.json())
            .then(data => {
                playerSelect.innerHTML = '<option value="">-- Choose from Roster --</option>';
                data.roster.forEach(name => {
                    let opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    playerSelect.appendChild(opt);
                });
                checkInBtn.disabled = false;
                showLoading(false);
            })
            .catch(err => {
                alert("Error loading roster from cloud. Make sure your Web App URL is correct.");
                console.error(err);
                showLoading(false);
            });
    });

// TRACKER VARIABLE TO PREVENT DOUBLE SUBMISSIONS
    let isSubmitting = false;

    checkInBtn.addEventListener('click', () => {
        const playerName = playerSelect.value;
        if (!playerName) {
            alert('Please select your name!');
            return;
        }

        // IF ALREADY SUBMITTING, BLOCK ANY LATER DUPES
        if (isSubmitting) return; 
        
        // LOCK THE SYSTEM IMMEDIATELY
        isSubmitting = true;
        showLoading(true);
        checkInBtn.disabled = true;
        checkInBtn.innerText = "Processing Check-In...";

        // Send submission to Google Sheet via POST request
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Essential for basic redirection
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ playerName: playerName })
        })
        .then(() => {
            // Keep button locked for 4 seconds to let Google process and block internal browser retries
            setTimeout(() => {
                showLoading(false);
                checkInBtn.disabled = false;
                checkInBtn.innerText = "Check In Today";
                isSubmitting = false; // Unlock for next person/day
                
                // Show clean confirmation screen
                document.getElementById('welcomeMessage').innerText = `Awesome job, ${playerName}! Your submission was sent to Coach's Google Sheet.`;
                document.getElementById('statTotal').innerText = "-";
                document.getElementById('statPoints').innerText = "-";
                document.getElementById('badgesContainer').innerHTML = "<p style='font-size:12px; color:#666;'>Logins from custom phones instantly record live to the sheet! To safely see your exact badges, check the master dashboard.</p>";
                successBox.style.display = 'block';
                window.scrollTo({ top: successBox.offsetTop, behavior: 'smooth' });
            }, 4000); 
        })
        .catch(err => {
            showLoading(false);
            checkInBtn.disabled = false;
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false;
            alert("Network error. Please try again.");
            console.error(err);
        });
    });

        showLoading(true);
        checkInBtn.disabled = true;

        // Send submission to Google Sheet via POST request
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Essential for handling cross-origin redirect restrictions with Apps Script
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ playerName: playerName })
        })
        .then(() => {
            // Because 'no-cors' mode hide response data, we do a quick second fetch to securely pull stats
            return fetch(WEB_APP_URL);
        })
        .then(() => {
            // Re-fetch calculations to show updated badges instantly
            // We simulate the calculation request safely or parse global historical context
            // To ensure 100% precision with no-cors limitations, the UI requests its profile update card:
            return fetch(WEB_APP_URL + "?refresh=true");
        })
        .then(res => res.json())
        .then(() => {
            // Deep evaluation call to read current status rows matching name
            return fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ playerName: playerName })
            });
        })
        .then(res => res.json())
        .then(result => {
            showLoading(false);
            checkInBtn.disabled = false;
            if(result.success) {
                showSuccessPanel(playerName, result);
            } else {
                alert("Database error: " + result.error);
            }
        })
        .catch(err => {
            // Fallback: If strict browser security blocks the recursive cross-origin read,
            // remind kids their sign-in successfully updated in the sheet row.
            showLoading(false);
            checkInBtn.disabled = false;
            document.getElementById('welcomeMessage').innerText = `Awesome job, ${playerName}! Your submission was sent to Coach's Google Sheet.`;
            document.getElementById('statTotal').innerText = "-";
            document.getElementById('statPoints').innerText = "-";
            document.getElementById('badgesContainer').innerHTML = "<p style='font-size:12px; color:#666;'>Logins from custom phones instantly record live to the sheet! To safely see your exact badges, check the master dashboard.</p>";
            successBox.style.display = 'block';
        });
    });

    function showLoading(isLoading) {
        loadingDiv.style.display = isLoading ? 'block' : 'none';
    }

    function showSuccessPanel(name, data) {
        document.getElementById('welcomeMessage').innerText = `Great workout, ${name}! Thanks for checking in.`;
        document.getElementById('statTotal').innerText = data.totalSignIns;
        document.getElementById('statPoints').innerText = data.points;

        const badgesDiv = document.getElementById('badgesContainer');
        badgesDiv.innerHTML = '';
        
        const baseBadges = ['First Timer', 'Early Bird', 'Comeback Kid'];
        for(let i=4; i<=32; i+=4) { baseBadges.push(`${i} Day Streak`); }
        for(let i=10; i<=50; i+=10) { baseBadges.push(`${i} Day Club`); }

        baseBadges.forEach(badge => {
            const hasIt = data.badges.includes(badge);
            if (hasIt || badge.includes('4 Day') || badge.includes('10 Day') || baseBadges.indexOf(badge) < 3) {
                const badgeEl = document.createElement('div');
                badgeEl.className = `badge ${hasIt ? 'earned' : ''}`;
                badgeEl.innerHTML = `${hasIt ? '⭐' : '🔒'} ${badge}`;
                badgesDiv.appendChild(badgeEl);
            }
        });

        successBox.style.display = 'block';
        window.scrollTo({ top: successBox.offsetTop, behavior: 'smooth' });
    }
</script>
</body>
</html>
