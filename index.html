<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Workouts Attendance Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121316; /* Matte Black background */
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Keeps it naturally stacked from the top on mobile */
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: #1e2025; /* Carbon grey panel */
            padding: 25px 20px;
            border-radius: 16px;
            border: 2px solid #b91c1c; /* Crimson border */
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* FORCES EVERY ELEMENT TO STACK VERTICALLY */
            align-items: center;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 0 15px 0;
            width: 100%;
        }
        .logo-container img {
            max-height: 110px;
            max-width: 130px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        h2 { 
            color: #ffffff; 
            font-size: 22px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin: 0 0 20px 0;
            line-height: 1.3;
            text-align: center;
            width: 100%;
        }
        .form-group {
            width: 100%;
            box-sizing: border-box;
        }
        label { 
            font-weight: bold; 
            display: block; 
            margin: 0 0 8px 0; 
            color: #ffffff; 
            text-align: left;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #121316;
            color: #ffffff;
            font-weight: 500;
            box-sizing: border-box;
        }
        select:focus { border-color: #ef4444; }
        button {
            width: 100%;
            background-color: #7f1d1d; /* Crimson red button */
            color: white;
            border: 1px solid #ef4444;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        button:active { background-color: #b91c1c; }
        button:disabled { background-color: #3f3f46; border-color: #27272a; cursor: not-allowed; color: #a1a1aa; }
        
        .loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #ef4444;
            margin: 15px 0 0 0;
            font-size: 15px;
            width: 100%;
        }
        .success-box {
            display: none;
            background-color: #121316;
            border: 1px solid #ef4444;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.1);
            width: 100%;
            box-sizing: border-box;
        }
        .success-box h3 { color: #ffffff; margin: 0 0 15px 0; font-size: 18px; font-weight: 700; text-align: center; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Side-by-side numbers just like mockup */
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
        }
        .stat-card {
            background: #1e2025;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #27272a;
            text-align: center;
            color: #a1a1aa;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .stat-num { font-size: 28px; font-weight: 800; color: #ffffff; margin-top: 5px; }
        
        .badge-title {
            color: #ffffff;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            text-align: left;
        }
        .badges-grid {
            display: flex;
            flex-direction: column; /* Forces dynamic badges to stack smoothly downwards */
            gap: 8px;
            width: 100%;
        }
        .badge-card {
            background: #450a0a; 
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #991b1b;
            text-align: left;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="SP LOGO.png" alt="SP Logo">
    </div>
    
    <h2>Summer Workouts<br>Attendance Tracker</h2>
    
    <div class="form-group">
        <label for="playerSelect">Select Your Name:</label>
        <select id="playerSelect">
            <option value="">-- Choose from Roster --</option>
        </select>
    </div>

    <button id="checkInBtn">Check In Today</button>
    <div id="loading" class="loading">⏳ Synchronizing Workout Logs...</div>

    <div id="successBox" class="success-box">
        <h3 id="welcomeMessage">Check-In Success!</h3>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div>Days Active</div>
                <div id="statTotal" class="stat-num">-</div>
            </div>
            <div class="stat-card">
                <div>Total Points</div>
                <div id="statPoints" class="stat-num">-</div>
            </div>
        </div>
        
        <div class="badge-title">🏅 Earned Milestones:</div>
        <div id="badgesContainer" class="badges-grid"></div>
    </div>
</div>
