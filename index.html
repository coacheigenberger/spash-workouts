<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Workouts Attendance Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 { text-align: center; color: #1e3a8a; margin-top: 0; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; color: #374151; }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #fff;
        }
        select:focus { border-color: #2563eb; }
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #2563eb;
            margin: 15px 0;
        }
        .success-box {
            display: none;
            background-color: #ecfdf5;
            border: 2px solid #10b981;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
        }
        .success-box h3 { color: #065f46; margin-top: 0; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .stat-card {
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            text-align: center;
        }
        .stat-num { font-size: 24px; font-weight: bold; color: #1e3a8a; }
        .badges-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .badge-card {
            background: #dbeafe;
            color: #1e40af;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #bfdbfe;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>☀️ Workout Tracker</h2>
    
    <label for="playerSelect">Select Your Name:</label>
    <select id="playerSelect">
        <option value="">-- Choose from Roster --</option>
    </select>

    <button id="checkInBtn">Check In Today</button>
    <div id="loading" class="loading">⏳ Sending to Google Sheets...</div>

    <div id="successBox" class="success-box">
        <h3 id="welcomeMessage">Check-In Successful!</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <div>Days Active</div>
                <div id="statTotal" class="stat-num">-</div>
            </div>
            <div class="stat-card">
                <div>Total Points</div>
                <div id="statPoints" class="stat-num">-</div>
            </div>
        </div>
        <strong>🏆 Earned Badges:</strong>
        <div id="badgesContainer" class="badges-grid"></div>
    </div>
</div>

        "FLIES, MASON J.", "FROST, ROHAN", "GALLOWAY, JAXON", "GAWLIK, TRENTON J.", 
        "GILLES, KEENAN", "GILLES, KELSON", "GLODOWSKI, JOSEPH J.", "GORSKI, JACOB", 
        "GORSKI, WILLIAM", "GOTTLIEB, ELIJAH G.", "GOTTLIEB, GABRIEL M.", "GRANT, ANDREW W.",

        "MERRIWEATHER, KHALANI J.", "MLSNA, WILLIAM J.", "MOUANOUTOUA, AIDEN L.", "MROZEK, MARSHALL E.",

        "PESTKA, DAMON M.", "PHILHOWER, MASON", "PHILLIP, COOPER S.", "PHILLIPS, BRAYDEN W.",

        "SAARI, MARLEY D.", "SANKEY, AEDIN K.", "SCHEMENAUER, JACE R.", "SCHMIES, LIAM",

        "SPRECHER, MILES", "STAEGE, JACKSON P.", "STEVENS, LEYTON M.", "SZALKUCKI, NICHOLAS J.", 
        "TRITT, GREYSON T.", "TRZEBIATOWSKI, BROOKLYNN M.", "TRZEBIATOWSKI, CLAIRE E.", "TRZEBIATOWSKI, DANIEL J.", 
        "TRZEBIATOWSKI, JACOB A.", "VOGEL, OLIVER L.", "WANTA, KADE A.", "WANTA, KAMDEN J.", 
        "WARZYNSKI, GAGE M.", "WEISS, JOHNATHAN W.", "WILLSON, LUCAS J.", "WIMME, ZAC", 
        "WIZA, OLIVIA M.", "WOOD, JAXON J.", "WORZALLA, JAMES M.", "YANG, ETHAN", 
        "YANG, ISAAC D.", "ZANOW, BENNETT"
    ];

    const playerSelect = document.getElementById('playerSelect');
    const checkInBtn = document.getElementById('checkInBtn');
    const loadingDiv = document.getElementById('loading');
    const successBox = document.getElementById('successBox');

    // Build selection dropdown list instantly on load
    window.addEventListener('DOMContentLoaded', () => {
        playerSelect.innerHTML = '<option value="">-- Choose from Roster --</option>';
        myRoster.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            playerSelect.appendChild(opt);
        });
    });

    let isSubmitting = false;

    checkInBtn.addEventListener('click', () => {
        const playerName = playerSelect.value;
        if (!playerName) {
            alert('Please select your name!');
            return;
        }

        if (isSubmitting) return; 
        
        isSubmitting = true;
        loadingDiv.style.display = 'block';
        checkInBtn.disabled = true;
        checkInBtn.innerText = "Processing Check-In...";

        // Send submission to web app via text formatting to bypass CORS restrictions
        fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ playerName: playerName })
        })
        .then(response => response.json())
        .then(res => {
            loadingDiv.style.display = 'none';
            checkInBtn.disabled = false;
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false; 

            if (res.success || res.msg === "Duplicate dropped safely") {
                document.getElementById('welcomeMessage').innerText = `Awesome job, ${playerName}! Your workout has been recorded.`;
                
                // Show values returned by the script
                document.getElementById('statTotal').innerText = res.totalSignIns || "1";
                document.getElementById('statPoints').innerText = res.points || "1";
                
                const container = document.getElementById('badgesContainer');
                container.innerHTML = "";
                
                if (res.badges && res.badges.length > 0) {
                    res.badges.forEach(badge => {
                        let bDiv = document.createElement('div');
                        bDiv.className = 'badge-card';
                        bDiv.innerHTML = `<strong>🏅 ${badge}</strong>`;
                        container.appendChild(bDiv);
                    });
                } else {
                    container.innerHTML = "<p style='color:#666;'>Keep showing up to unlock milestones!</p>";
                }
                
                successBox.style.display = 'block';
                window.scrollTo({ top: successBox.offsetTop, behavior: 'smooth' });
            } else {
                alert("Database Error: " + res.error);
            }
        })
        .catch(err => {
            loadingDiv.style.display = 'none';
            checkInBtn.disabled = false;
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false;
            alert("Handshake error. Make sure your Google Script deployment is set to 'Anyone'.");
            console.error(err);
        });
    });
</script>

</body>
</html>
