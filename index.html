<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Workouts Attendance Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121316; /* Matte Black background */
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Keeps it naturally stacked from the top on mobile */
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: #1e2025; /* Carbon grey panel */
            padding: 25px 20px;
            border-radius: 16px;
            border: 2px solid #b91c1c; /* Crimson border */
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* FORCES EVERY ELEMENT TO STACK VERTICALLY */
            align-items: center;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 0 15px 0;
            width: 100%;
        }
        .logo-container img {
            max-height: 110px;
            max-width: 130px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        h2 { 
            color: #ffffff; 
            font-size: 22px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin: 0 0 20px 0;
            line-height: 1.3;
            text-align: center;
            width: 100%;
        }
        .form-group {
            width: 100%;
            box-sizing: border-box;
        }
        label { 
            font-weight: bold; 
            display: block; 
            margin: 0 0 8px 0; 
            color: #ffffff; 
            text-align: left;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #121316;
            color: #ffffff;
            font-weight: 500;
            box-sizing: border-box;
        }
        select:focus { border-color: #ef4444; }
        button {
            width: 100%;
            background-color: #7f1d1d; /* Crimson red button */
            color: white;
            border: 1px solid #ef4444;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        button:active { background-color: #b91c1c; }
        button:disabled { background-color: #3f3f46; border-color: #27272a; cursor: not-allowed; color: #a1a1aa; }
        
        .loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #ef4444;
            margin: 15px 0 0 0;
            font-size: 15px;
            width: 100%;
        }
        .success-box {
            display: none;
            background-color: #121316;
            border: 1px solid #ef4444;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.1);
            width: 100%;
            box-sizing: border-box;
        }
        .success-box h3 { color: #ffffff; margin: 0 0 15px 0; font-size: 18px; font-weight: 700; text-align: center; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Side-by-side numbers just like mockup */
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
        }
        .stat-card {
            background: #1e2025;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #27272a;
            text-align: center;
            color: #a1a1aa;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .stat-num { font-size: 28px; font-weight: 800; color: #ffffff; margin-top: 5px; }
        
        .badge-title {
            color: #ffffff;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            text-align: left;
        }
        .badges-grid {
            display: flex;
            flex-direction: column; /* Forces dynamic badges to stack smoothly downwards */
            gap: 8px;
            width: 100%;
        }
        .badge-card {
            background: #450a0a; 
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #991b1b;
            text-align: left;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="SP LOGO.png" alt="SP Logo">
    </div>
    
    <h2>Summer Workouts<br>Attendance Tracker</h2>
    
    <div class="form-group">
        <label for="playerSelect">Select Your Name:</label>
        <select id="playerSelect">
            <option value="">-- Choose from Roster --</option>
        </select>
    </div>

    <button id="checkInBtn">Check In Today</button>
    <div id="loading" class="loading">⏳ Synchronizing Workout Logs...</div>

    <div id="successBox" class="success-box">
        <h3 id="welcomeMessage">Check-In Success!</h3>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div>Days Active</div>
                <div id="statTotal" class="stat-num">-</div>
            </div>
            <div class="stat-card">
                <div>Total Points</div>
                <div id="statPoints" class="stat-num">-</div>
            </div>
        </div>
        
        <div class="badge-title">🏅 Earned Milestones:</div>
        <div id="badgesContainer" class="badges-grid"></div>
    </div>
</div>

<script>

    // 2. Pre-loaded alphabetical roster

        "ALTENBURG, FINLEY O.", "AMARO, AIDEN A.", "ANANIADIS, CHRISTOPHER G.", "ARMON, DAVID III", 
        "BANKS, DANIEL L. III", "BARTELT, OLIVER K.", "BARTELT, WESLEY E.", "BERNSTEIN, EMERY L.",

        "BOURESSA, WILLIAM J.", "BREITBACH, TRENT G.", "BRENEMAN, DYLAN J.", "BRENEMAN, THEO",

        "CIULLA, JACOB", "CORDY, DIESEL S.", "CORDY, JOHNATHAN", "CYCHOSZ, KARSTEN L.", 
        "DEERING, AIDEN", "DEMROW, LUCAS", "DERNBACH, DAYNE", "DIEKHUS, BENJAMIN H.", 
        "DIEKHUS, CALLIE E.", "DORSHORST, ELIJAH L.", "DUDA, JOSLYN", "DUELLMAN, CALEB W.", 
        "EHLINGER, LUKE T.", "EHLINGER, ZACHERY O.", "EICHENBERG, LUKE D.", "FAHRNER, JETT M.",

        "FLIES, MASON J.", "FROST, ROHAN", "GALLOWAY, JAXON", "GAWLIK, TRENTON J.", 
        "GILLES, KEENAN", "GILLES, KELSON", "GLODOWSKI, JOSEPH J.", "GORSKI, JACOB", 
        "GORSKI, WILLIAM", "GOTTLIEB, ELIJAH G.", "GOTTLIEB, GABRIEL M.", "GRANT, ANDREW W.", 
        "HAMILTON, BENJAMIN G.", "HAMILTON, JACOB R.", "HAMILTON, PHILLIP C. IV", "HANLON, ALEXANDER J.", 
        "HARDIN, JOHN JR", "HENDERSON, LOGAN A.", "HEREK-WRIGHT, MASON P.", "HOCKETT, BRAXTON M.",

        "JANDRAIN, CONNOR C.", "JANKOWSKI, BRAEDEN M.", "JENSEN, COLTON K.", "JESCH, LEVI", 
        "JOHNSON, JILLIAN R.", "JOHNSON, TITUS L.", "KAHLE, BRADY J.", "KARALIUNAS, EASTON N.", 
        "KARALIUNAS, KACE W.", "KARALIUNAS, PEYTON P.", "KARPINSKI, LEVI A.", "KECK, DEAN",

        "KING, TYLER C.", "KINSLOW, CARTER D.", "KIRKING, EMERIK", "KIRSCHBAUM, BECK",

        "KORNOWSKI, SAMUEL J.", "KRAEMER, EMMETT J.", "KRIHAK, CHARLES V.", "KRUZITSKI, EVAN",

        "LEWANDOWSKI, JAKE M.", "LIPKE, ISAAC R.", "LOCKMAN, BRENNA S.", "LOCKMAN, COLLIN B.",

        "MANSAVAGE, BENNETT", "MANUEL, KYRON", "MCDOWELL, NATHAN P.", "MCINTOSH, HENRY", 
        "MCQUILLEN, TRENTON J.", "MEDELLIN, XAVIER", "MELENDEZ, EMILIANO", "MELVILLE, CLAYTON G.", 
        "MERRIWEATHER, KHALANI J.", "MLSNA, WILLIAM J.", "MOUANOUTOUA, AIDEN L.", "MROZEK, MARSHALL E.",

        "REHFELDT, CHASE E.", "RICHARDSON, REINER L.", "ROGERS, ELIAS K.", "ROHDE, BENJAMIN", 
        "ROSENAU, MATTHEW N.", "ROTH, HENRY", "ROTH, MARSHALL D.", "ROUSE, EVAN M.", 
        "SAARI, MARLEY D.", "SANKEY, AEDIN K.", "SCHEMENAUER, JACE R.", "SCHMIES, LIAM", 
        "SHIREK, CORA L.", "SIMONS, MARSHALL D.", "SKRENES, FRANKLIN", "SMITH, GRADY", 
        "SORTERS, DAMEON X.", "SOWIEJA, CARTER", "SPIRKO, SAMPSON B.", "SPRECHER, JACK", 
        "SPRECHER, MILES", "STAEGE, JACKSON P.", "STEVENS, LEYTON M.", "SZALKUCKI, NICHOLAS J.", 
        "TRITT, GREYSON T.", "TRZEBIATOWSKI, BROOKLYNN M.", "TRZEBIATOWSKI, CLAIRE E.", "TRZEBIATOWSKI, DANIEL J.", 
        "TRZEBIATOWSKI, JACOB A.", "VOGEL, OLIVER L.", "WANTA, KADE A.", "WANTA, KAMDEN J.", 
        "WARZYNSKI, GAGE M.", "WEISS, JOHNATHAN W.", "WILLSON, LUCAS J.", "WIMME, ZAC", 
        "WIZA, OLIVIA M.", "WOOD, JAXON J.", "WORZALLA, JAMES M.", "YANG, ETHAN", 
        "YANG, ISAAC D.", "ZANOW, BENNETT"
    ];

    const playerSelect = document.getElementById('playerSelect');
    const checkInBtn = document.getElementById('checkInBtn');
    const loadingDiv = document.getElementById('loading');
    const successBox = document.getElementById('successBox');

    window.addEventListener('DOMContentLoaded', () => {
        playerSelect.innerHTML = '<option value="">-- Choose from Roster --</option>';
        myRoster.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            playerSelect.appendChild(opt);
        });
    });

    let isSubmitting = false;

    checkInBtn.addEventListener('click', () => {
        const playerName = playerSelect.value;
        if (!playerName) {
            alert('Please select your name!');
            return;
        }

        if (isSubmitting) return; 
        
        isSubmitting = true;
        loadingDiv.style.display = 'block';
        checkInBtn.disabled = true;
        checkInBtn.style.backgroundColor = "#3f3f46";
        checkInBtn.innerText = "Processing Check-In...";

        fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ playerName: playerName })
        })
        .then(response => response.json())
        .then(res => {
            loadingDiv.style.display = 'none';
            checkInBtn.disabled = false;
            checkInBtn.style.backgroundColor = "#7f1d1d";
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false; 

            if (res.success || res.msg === "Duplicate dropped safely") {
                document.getElementById('welcomeMessage').innerText = `Check-In Success!`;
                
                document.getElementById('statTotal').innerText = res.totalSignIns || "1";
                document.getElementById('statPoints').innerText = res.points || "1";
                
                const container = document.getElementById('badgesContainer');
                container.innerHTML = "";
                
                if (res.badges && res.badges.length > 0) {
    res.badges.forEach(badge => {
        let bDiv = document.createElement('div');
        bDiv.className = 'badge-card';
        bDiv.style.display = "flex";
        bDiv.style.alignItems = "center";
        bDiv.style.marginBottom = "8px";

        // Choose custom background styles or icons depending on the badge type
        if (badge.includes("Early Bird")) {
            bDiv.style.background = "linear-gradient(135deg, #7c2d12, #450a0a)";
            bDiv.style.borderColor = "#ea580c";
            bDiv.innerHTML = `<span style="font-size: 18px;">🌅</span> <div style="margin-left:12px; text-align:left;"><strong>Early Bird Award</strong><br><span style="font-size:11px; color:#ffedd5;">First to hit the grind today!</span></div>`;
        } 
        else if (badge.includes("Streak")) {
            bDiv.style.background = "linear-gradient(135deg, #450a0a, #1e1b4b)";
            bDiv.style.borderColor = "#f43f5e";
            bDiv.innerHTML = `<span style="font-size: 18px;">🔥</span> <div style="margin-left:12px; text-align:left;"><strong>${badge.split(" (")[0]}</strong><br><span style="font-size:11px; color:#ffe4e6;">Consecutive training streak!</span></div>`;
        } 
        else {
            // Default milestone layout matching your stealth mockup theme
            bDiv.style.background = "#450a0a";
            bDiv.style.borderColor = "#991b1b";
            bDiv.innerHTML = `<span style="font-size: 18px;">🏆</span> <div style="margin-left:12px; text-align:left;"><strong>Milestone Unlocked</strong><br><span style="font-size:11px; color:#fca5a5;">${badge}</span></div>`;
        }

        container.appendChild(bDiv);
    });
} else {
    container.innerHTML = "<p style='color:#a1a1aa; font-size:13px; text-align:center;'>Keep checking in to unlock milestones!</p>";
}
                
                successBox.style.display = 'block';
                window.scrollTo({ top: successBox.offsetTop, behavior: 'smooth' });
            } else {
                alert("Database Error: " + res.error);
            }
        })
        .catch(err => {
            loadingDiv.style.display = 'none';
            checkInBtn.disabled = false;
            checkInBtn.style.backgroundColor = "#7f1d1d";
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false;
            alert("Connection error. Make sure your Google Script deployment is set to 'Anyone'.");
            console.error(err);
        });
    });
</script>

</body>
</html>
