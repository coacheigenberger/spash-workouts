<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Workouts Attendance Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121316; /* Textured Dark Carbon */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #1e2025; /* Stealth Matte Grey */
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #b91c1c; /* Crimson Outline Border */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 15px;
        }
        .logo-container img {
            max-width: 130px;
            height: auto;
        }
        h2 { 
            color: #ffffff; 
            font-size: 24px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin: 10px 0 25px 0;
            line-height: 1.3;
        }
        label { 
            font-weight: bold; 
            display: block; 
            margin: 15px 0 8px; 
            color: #ffffff; 
            text-align: left;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #121316;
            color: #ffffff;
            font-weight: 500;
        }
        select:focus { border-color: #ef4444; }
        button {
            width: 100%;
            background-color: #7f1d1d; /* Deep Team Crimson Red */
            color: white;
            border: 1px solid #ef4444;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        button:active { background-color: #b91c1c; }
        button:disabled { background-color: #3f3f46; border-color: #27272a; cursor: not-allowed; color: #a1a1aa; }
        
        .loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #ef4444;
            margin: 20px 0 10px;
            font-size: 15px;
        }
        .success-box {
            display: none;
            background-color: #121316;
            border: 1px solid #ef4444;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.1);
        }
        .success-box h3 { color: #ffffff; margin-top: 0; font-size: 20px; font-weight: 700; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #1e2025;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #27272a;
            text-align: center;
            color: #a1a1aa;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .stat-num { font-size: 32px; font-weight: 800; color: #ffffff; margin-top: 5px; }
        
        .badges-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .badge-card {
            background: #450a0a; /* Dark Red Badge Row */
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #991b1b;
            text-align: left;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="logo-container" style="display: flex; justify-content: center; align-items: center; padding: 10px 0;">
        <img src="SP LOGO.png" alt="SP Logo" style="max-height: 110px; width: auto; object-fit: contain;">
    </div>   
    
    <h2>Summer Workouts<br>Attendance Tracker</h2>
    
    <label for="playerSelect">Select Your Name:</label>
    <select id="playerSelect">
        <option value="">-- Choose from Roster --</option>
    </select>

    <button id="checkInBtn">Check In Today</button>
    <div id="loading" class="loading">⏳ Synchronizing Workout Logs...</div>

    <div id="successBox" class="success-box">
        <h3 id="welcomeMessage">Check-In Success!</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <div>Days Active</div>
                <div id="statTotal" class="stat-num">-</div>
            </div>
            <div class="stat-card">
                <div>Total Points</div>
                <div id="statPoints" class="stat-num">-</div>
            </div>
        </div>
        <label>🏅 Earned Milestones:</label>
        <div id="badgesContainer" class="badges-grid"></div>
    </div>
</div>

        "SPRECHER, MILES", "STAEGE, JACKSON P.", "STEVENS, LEYTON M.", "SZALKUCKI, NICHOLAS J.", 
        "TRITT, GREYSON T.", "TRZEBIATOWSKI, BROOKLYNN M.", "TRZEBIATOWSKI, CLAIRE E.", "TRZEBIATOWSKI, DANIEL J.", 
        "TRZEBIATOWSKI, JACOB A.", "VOGEL, OLIVER L.", "WANTA, KADE A.", "WANTA, KAMDEN J.", 
        "WARZYNSKI, GAGE M.", "WEISS, JOHNATHAN W.", "WILLSON, LUCAS J.", "WIMME, ZAC", 
        "WIZA, OLIVIA M.", "WOOD, JAXON J.", "WORZALLA, JAMES M.", "YANG, ETHAN", 
        "YANG, ISAAC D.", "ZANOW, BENNETT"
    ];

    const playerSelect = document.getElementById('playerSelect');
    const checkInBtn = document.getElementById('checkInBtn');
    const loadingDiv = document.getElementById('loading');
    const successBox = document.getElementById('successBox');

    // Load roster instantly
    window.addEventListener('DOMContentLoaded', () => {
        playerSelect.innerHTML = '<option value="">-- Choose from Roster --</option>';
        myRoster.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            playerSelect.appendChild(opt);
        });
    });

    let isSubmitting = false;

    checkInBtn.addEventListener('click', () => {
        const playerName = playerSelect.value;
        if (!playerName) {
            alert('Please select your name!');
            return;
        }

        if (isSubmitting) return; 
        
        isSubmitting = true;
        loadingDiv.style.display = 'block';
        checkInBtn.disabled = true;
        checkInBtn.style.backgroundColor = "#3f3f46";
        checkInBtn.innerText = "Processing Check-In...";

        fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ playerName: playerName })
        })
        .then(response => response.json())
        .then(res => {
            loadingDiv.style.display = 'none';
            checkInBtn.disabled = false;
            checkInBtn.style.backgroundColor = "#7f1d1d";
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false; 

            if (res.success || res.msg === "Duplicate dropped safely") {
                document.getElementById('welcomeMessage').innerText = `Check-In Success!`;
                
                document.getElementById('statTotal').innerText = res.totalSignIns || "1";
                document.getElementById('statPoints').innerText = res.points || "1";
                
                const container = document.getElementById('badgesContainer');
                container.innerHTML = "";
                
                if (res.badges && res.badges.length > 0) {
                    res.badges.forEach(badge => {
                        let bDiv = document.createElement('div');
                        bDiv.className = 'badge-card';
                        bDiv.innerHTML = `<span>🏅 &nbsp; ${badge}</span>`;
                        container.appendChild(bDiv);
                    });
                } else {
                    container.innerHTML = "<p style='color:#a1a1aa; font-size:13px;'>Keep checking in to unlock milestones!</p>";
                }
                
                successBox.style.display = 'block';
                window.scrollTo({ top: successBox.offsetTop, behavior: 'smooth' });
            } else {
                alert("Database Error: " + res.error);
            }
        })
        .catch(err => {
            loadingDiv.style.display = 'none';
            checkInBtn.disabled = false;
            checkInBtn.style.backgroundColor = "#7f1d1d";
            checkInBtn.innerText = "Check In Today";
            isSubmitting = false;
            alert("Connection error. Make sure your Google Script deployment is set to 'Anyone'.");
            console.error(err);
        });
    });
</script>

</body>
</html>
